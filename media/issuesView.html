<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Открытые задачи</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .issue-block { transition: all 0.15s ease; cursor: pointer; }
    .issue-block:hover { border-color: rgb(99 102 241); }
    .issue-block.expanded { border-color: rgb(99 102 241); }
    .issue-body { white-space: pre-wrap; word-wrap: break-word; }
    .external-link { cursor: pointer; text-decoration: underline; }
    .external-link:hover { color: rgb(99 102 241); }
    .comment-item { border-left: 3px solid rgb(229 231 235); padding-left: 0.75rem; margin-left: 0.5rem; }
    .loading { opacity: 0.6; pointer-events: none; }
  </style>
</head>
<body class="bg-gray-50 dark:bg-gray-950 min-h-screen text-gray-900 dark:text-gray-100">
  <div class="max-w-4xl mx-auto px-4 py-6">
    <div class="mb-6">
      <h1 class="text-2xl font-bold tracking-tight">{{userName}}</h1>
    </div>
    <div class="mb-4 flex items-center justify-between">
      <span class="text-sm font-medium text-gray-600 dark:text-gray-300">
        Открыто: <strong class="text-indigo-600 dark:text-indigo-400">{{issuesCount}}</strong>
      </span>
      <span class="text-xs text-gray-500 dark:text-gray-400">{{updatedAt}}</span>
    </div>
    <div id="issues-list" class="space-y-3"></div>
  </div>
  <script type="application/json" id="issues-data">{{issuesJson}}</script>
  <script>
    const vscode = acquireVsCodeApi();
    const issues = JSON.parse(document.getElementById('issues-data').textContent);
    const formatDate = (iso) => {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short', year: d.getFullYear() !== new Date().getFullYear() ? 'numeric' : undefined, hour: '2-digit', minute: '2-digit' });
    };
    const escapeHtml = (s) => {
      if (!s) return '';
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    };
    const renderMarkdown = (md) => {
      if (!md || !window.marked) return escapeHtml(md);
      try { return marked.parse(md, { gfm: true, breaks: true }); } catch { return escapeHtml(md); }
    };
    const renderIssue = (issue, expanded = false, comments = null, loading = false) => {
      const labels = (issue.labels || []).map(l => `<span class="px-1.5 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300">${escapeHtml(l)}</span>`).join(' ');
      let bodyHtml = '';
      let commentsHtml = '';
      if (expanded) {
        bodyHtml = `<div class="mt-3 p-3 bg-gray-100 dark:bg-gray-800/50 rounded text-sm issue-body">${renderMarkdown(issue.description || '(нет описания)')}</div>`;
        if (loading) {
          commentsHtml = '<div class="mt-3 text-sm text-gray-500">Загрузка комментариев…</div>';
        } else if (comments && comments.length > 0) {
          commentsHtml = '<div class="mt-3 space-y-2"><div class="text-xs font-medium text-gray-500 uppercase">Комментарии</div>' +
            comments.map(c => `
              <div class="comment-item text-sm">
                <div class="flex items-center gap-2 text-gray-600 dark:text-gray-400">
                  <span class="font-medium">${escapeHtml(c.author?.name || 'Аноним')}</span>
                  <span class="text-xs">${formatDate(c.created_at)}</span>
                </div>
                <div class="mt-1 issue-body">${renderMarkdown(c.body)}</div>
              </div>
            `).join('') + '</div>';
        } else {
          commentsHtml = '<div class="mt-3 text-sm text-gray-500">Комментариев нет</div>';
        }
        commentsHtml += `
          <div class="mt-3 pt-3 border-t border-gray-200 dark:border-gray-600 flex flex-wrap gap-2">
            <button class="close-issue-btn px-3 py-1.5 text-sm font-medium rounded border border-amber-500 text-amber-600 dark:text-amber-400 hover:bg-amber-50 dark:hover:bg-amber-900/20">Закрыть</button>
            <button class="reassign-issue-btn px-3 py-1.5 text-sm font-medium rounded border border-indigo-500 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-50 dark:hover:bg-indigo-900/20">Переназначить</button>
          </div>
        `;
      }
      return `
        <div class="issue-block rounded-lg border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 p-3 ${expanded ? 'expanded' : ''} ${loading ? 'loading' : ''}"
             data-project-id="${escapeHtml(String(issue.project_id))}"
             data-project-path="${escapeHtml((issue.references?.full || '').split('#')[0] || '')}"
             data-issue-iid="${escapeHtml(String(issue.iid))}"
             data-expanded="${expanded}">
          <div class="flex items-start justify-between gap-2">
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap items-center gap-2 mb-1">
                <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-emerald-50 text-emerald-800 dark:bg-emerald-900/40 dark:text-emerald-200 border border-emerald-200 dark:border-emerald-800" title="Проект">
                  ${escapeHtml(issue.references?.full || 'без проекта')}
                </span>
                <span class="text-xs font-mono text-gray-500">#${issue.iid}</span>
              </div>
              <h3 class="font-medium text-gray-900 dark:text-white line-clamp-2">${escapeHtml(issue.title)}</h3>
              ${labels ? `<div class="mt-1 flex flex-wrap gap-1">${labels}</div>` : ''}
              <div class="mt-1 flex items-center gap-3 text-xs text-gray-500">
                <span>${formatDate(issue.created_at)}</span>
                <span>${formatDate(issue.updated_at)}</span>
                <a class="external-link text-indigo-600 dark:text-indigo-400" href="#" data-href="${escapeHtml(issue.web_url || '')}">Открыть в GitLab →</a>
              </div>
            </div>
          </div>
          ${bodyHtml}
          ${commentsHtml}
        </div>
      `;
    };
    const container = document.getElementById('issues-list');
    const expanded = {};
    const commentsCache = {};
    const render = () => {
      container.innerHTML = issues.map(issue => {
        const key = `${issue.project_id}-${issue.iid}`;
        return renderIssue(issue, expanded[key], commentsCache[key], expanded[key] && commentsCache[key] === undefined && !!commentsCache[key + '_loading']);
      }).join('');
      container.querySelectorAll('.issue-block').forEach(el => {
        const link = el.querySelector('.external-link');
        if (link) link.addEventListener('click', e => { e.stopPropagation(); vscode.postMessage({ command: 'openExternal', url: link.dataset.href }); });
        const closeBtn = el.querySelector('.close-issue-btn');
        const reassignBtn = el.querySelector('.reassign-issue-btn');
        if (closeBtn) {
          closeBtn.addEventListener('click', e => {
            e.stopPropagation();
            vscode.postMessage({ command: 'closeIssue', projectId: el.dataset.projectId, projectPath: el.dataset.projectPath || '', issueIid: el.dataset.issueIid });
          });
        }
        if (reassignBtn) {
          reassignBtn.addEventListener('click', e => {
            e.stopPropagation();
            vscode.postMessage({ command: 'reassignIssue', projectId: el.dataset.projectId, projectPath: el.dataset.projectPath || '', issueIid: el.dataset.issueIid });
          });
        }
        el.addEventListener('click', (e) => {
          if (e.target.closest('.external-link') || e.target.closest('.close-issue-btn') || e.target.closest('.reassign-issue-btn')) return;
          const projectId = el.dataset.projectId;
          const issueIid = el.dataset.issueIid;
          const key = `${projectId}-${issueIid}`;
          const wasExpanded = expanded[key];
          expanded[key] = !wasExpanded;
          if (expanded[key] && commentsCache[key] === undefined && !commentsCache[key + '_loading']) {
            commentsCache[key + '_loading'] = true;
            render();
            vscode.postMessage({ command: 'getComments', projectId, projectPath: el.dataset.projectPath || '', issueIid });
          } else {
            render();
          }
        });
      });
    };
    render();
    window.addEventListener('message', e => {
      const { command, projectId, issueIid, comments } = e.data || {};
      if (command === 'comments' && projectId && issueIid) {
        const key = `${projectId}-${issueIid}`;
        commentsCache[key] = comments || [];
        delete commentsCache[key + '_loading'];
        render();
      }
    });
  </script>
</body>
</html>
